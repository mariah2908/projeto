<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cadastro de Clientes</h1>
    <form action="salvarcliente.php" method="post" onsubmit="return validar()"></form>
    
        <label for="id_cliente">ID do Cliente</label>
        <input type="text" id="id_cliente" name="id_cliente" placeholder="Digite o código do cliente" required>

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>

        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

        <label for="email">E-mail</label>
        <input type="text" id="email" name="email" placeholder="email@exemplo.com" required>

        <label for="data_cadastro">Data de Cadastro</label>
        <input type="text" id="data_cadastro" name="data_cadastro" placeholder="dd/mm/aaaa" required>
            
        <button type="submit">Cadastrar Cliente</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
